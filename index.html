<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nuWalls - Minimal Wallpaper Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="site-dark">

    <header>
        <div class="logo">
            <h1>NuWALLS</h1>
        </div>
        <p>Generate your minimal wallpaper</p>
        <button class="site-theme-btn" id="theme-toggle" title="Toggle site theme">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3" />
                <path
                    d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"
                    stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
            </svg>
        </button>
    </header>

    <div class="main-layout">
        <div class="preview-area">
            <div class="preview-container">

                <!-- Single card wrapping both wallpapers -->
                <div class="wallpaper-card combined-card">

                    <div class="previews-wrapper">

                        <div class="preview-item">
                            <div class="preview-label">Desktop 4K</div>
                            <div class="canvas-wrapper">
                                <canvas id="canvas-desktop" width="3840" height="2160"></canvas>
                                <div class="clock-overlay desktop-clock">
                                    <div class="time" id="desktop-time">09:41</div>
                                    <div class="date" id="desktop-date">Tuesday, 9 January</div>
                                </div>
                                <button class="download-btn icon-circle" id="download-desktop" title="Download Desktop">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="7 10 12 15 17 10"></polyline>
                                        <line x1="12" y1="15" x2="12" y2="3"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="preview-item">
                            <div class="preview-label">Phone</div>
                            <div class="canvas-wrapper">
                                <canvas id="canvas-mobile" width="1290" height="2796"></canvas>
                                <div class="clock-overlay mobile-clock">
                                    <div class="time" id="mobile-time">09:41</div>
                                    <div class="date" id="mobile-date">Tuesday, 9 January</div>
                                </div>
                                <button class="download-btn icon-circle" id="download-mobile" title="Download Mobile">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="7 10 12 15 17 10"></polyline>
                                        <line x1="12" y1="15" x2="12" y2="3"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>

                    </div>

                </div>

            </div>
        </div>

        <div class="controls-area">

            <div class="control-section">
                <h3>Wallpaper Mode</h3>
                <div class="pattern-selector">
                    <button class="mode-btn active" data-mode="dark">Dark</button>
                    <button class="mode-btn" data-mode="light">Light</button>
                </div>
            </div>

            <div class="control-section">
                <h3>Pattern Style</h3>
                <div class="pattern-selector">
                    <button class="pattern-btn active" data-type="geometric">Geometric</button>
                    <button class="pattern-btn" data-type="waves">Waves</button>
                    <button class="pattern-btn" data-type="triangles">Triangles</button>
                    <button class="pattern-btn" data-type="blobs">Blobs</button>
                </div>
            </div>

            <div class="control-section">
                <h3>Color Palette</h3>
                <div class="palette-selector" id="palette-selector">
                    <!-- Palettes dynamically generated -->
                </div>
            </div>

            <button class="generate-btn" id="generate-btn">
                Generate new layout
            </button>
        </div>
    </div>

    <footer>
        <hr class="footer-line">
        <p class="footer-text">created by -- <a href="https://www.instagram.com/jarvisdotai?igsh=MWE4MTA4cHpzNnMzcQ==" target="_blank" class="footer-link">@jarvisdotai</a></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
